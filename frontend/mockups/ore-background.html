<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Plainlode — ore background (capture)</title>
<!--
  Standalone full-viewport render of the Plainlode ore/rock background with gold
  vein seams, for video/presentation capture. Ported verbatim from
  frontend/src/components/OreBackground.jsx. No content, just the backdrop.
-->
<style>
  html, body { margin: 0; height: 100%; background: #0C0F13; }
  *, *::before, *::after { box-sizing: border-box; }
  #ore {
    position: fixed;
    inset: 0;
    pointer-events: none;
    background:
      radial-gradient(130% 95% at 50% 4%, rgba(72,80,90,0.85) 0%, rgba(58,64,72,0) 48%),
      radial-gradient(95% 75% at 82% 114%, rgba(232,181,77,0.13) 0%, transparent 44%),
      radial-gradient(75% 60% at 12% -8%, rgba(232,181,77,0.1) 0%, transparent 42%),
      repeating-linear-gradient(112deg, rgba(255,255,255,0.035) 0 1px, transparent 1px 22px),
      repeating-linear-gradient(64deg, rgba(0,0,0,0.4) 0 1px, transparent 1px 34px),
      radial-gradient(150% 130% at 50% 40%, transparent 46%, rgba(0,0,0,0.78) 100%),
      #0C0F13;
  }
  #ore .seam { position: absolute; border-radius: 2px; }
  .v1 {
    top: -12%; left: 17%; width: 3px; height: 66%;
    transform: rotate(6deg); filter: blur(1.5px);
    background: linear-gradient(180deg, transparent 0%, rgba(232,181,77,0.7) 45%, rgba(232,181,77,0.12) 100%);
  }
  .v2 {
    top: 34%; left: 20.5%; width: 3px; height: 60%;
    transform: rotate(-4deg); filter: blur(1.5px);
    background: linear-gradient(180deg, rgba(232,181,77,0.1) 0%, rgba(232,181,77,0.55) 40%, transparent 100%);
  }
  .v3 {
    top: 15%; left: 15.5%; width: 2px; height: 34%;
    transform: rotate(14deg); filter: blur(1px);
    background: linear-gradient(180deg, transparent, rgba(232,181,77,0.35), transparent);
  }
  .glow {
    top: 30%; left: 19%; width: 90px; height: 90px;
    transform: translate(-50%,-50%); filter: blur(30px); border-radius: 50%;
    background: radial-gradient(circle, rgba(232,181,77,0.32), transparent 70%);
  }
</style>
</head>
<body>
  <div id="ore" aria-hidden="true">
    <div class="seam v1"></div>
    <div class="seam v2"></div>
    <div class="seam v3"></div>
    <div class="seam glow"></div>
  </div>
</body>
</html>
